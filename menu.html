<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meals Menu - Hostel Mess</title>
    
    <!-- STRICT LOGIN PROTECTION - RUNS BEFORE ANYTHING LOADS -->
    <script>
        (function() {
            if (window.performance && window.performance.navigation.type === window.performance.navigation.TYPE_BACK_FORWARD) {
                window.location.replace('login.html');
                return;
            }
        })();
    </script>

    <!-- STUDENT LOGIN PROTECTION -->
    <script>
        (function () {
            document.documentElement.style.visibility = 'hidden';

            const studentLoggedIn = sessionStorage.getItem('studentLoggedIn') === 'true' || localStorage.getItem('studentLoggedIn') === 'true';
            const staffLoggedIn = sessionStorage.getItem('staffLoggedIn') === 'true' || localStorage.getItem('staffLoggedIn') === 'true';

            if (staffLoggedIn) {
                window.location.replace('staff.html');
                return;
            }

            if (!studentLoggedIn) {
                window.location.replace('login.html');
                return;
            }

            document.documentElement.style.visibility = 'visible';
        })();
    </script>

    <!-- AGGRESSIVE BACK BUTTON PREVENTION -->
    <script>
        (function() {
            window.addEventListener('pageshow', function(event) {
                if (event.persisted) {
                    const studentLoggedIn = sessionStorage.getItem('studentLoggedIn') === 'true' || localStorage.getItem('studentLoggedIn') === 'true';
                    const staffLoggedIn = sessionStorage.getItem('staffLoggedIn') === 'true' || localStorage.getItem('staffLoggedIn') === 'true';
                    
                    if (!studentLoggedIn && !staffLoggedIn) {
                        window.location.replace('login.html');
                    }
                }
            });

            history.pushState(null, null, location.href);
            
            window.onpopstate = function() {
                const studentLoggedIn = sessionStorage.getItem('studentLoggedIn') === 'true' || localStorage.getItem('studentLoggedIn') === 'true';
                const staffLoggedIn = sessionStorage.getItem('staffLoggedIn') === 'true' || localStorage.getItem('staffLoggedIn') === 'true';
                
                if (!studentLoggedIn && !staffLoggedIn) {
                    window.location.replace('login.html');
                } else {
                    history.pushState(null, null, location.href);
                }
            };
        })();
    </script>

    <!-- PREVENT PAGE CACHING -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="Cache-Control" content="no-store">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f3f4f6;
            color: #1f2937;
            padding: 40px 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 18px 40px rgba(79, 70, 229, 0.15);
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .nav-links {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: #f3f4f6;
            color: #4b5563;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .nav-link:hover {
            background: #e5e7eb;
            transform: translateY(-2px);
        }

        .nav-link.active {
            background: #4f46e5;
            color: white;
        }

        .logout-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: #ef4444;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        .date-picker-form {
            display: flex;
            gap: 10px;
            align-items: center;
            background: #f9fafb;
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
        }

        .date-picker-form input[type="date"] {
            border: none;
            background: transparent;
            font-family: inherit;
            font-weight: 600;
            color: #4f46e5;
            outline: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
        }

        .title-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .title-section h1 {
            font-size: 2.5rem;
            color: #111827;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #6b7280;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .pref-badge {
            display: inline-block;
            padding: 8px 20px;
            background: #f3f4f6;
            border-radius: 30px;
            font-weight: 600;
            color: #4b5563;
        }

        .pref-badge span {
            color: #4f46e5;
            font-weight: 700;
        }

        .meal-group {
            margin-bottom: 40px;
        }

        .meal-title {
            font-size: 1.8rem;
            color: #1f2937;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #4f46e5;
        }

        .dishes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .dish-card {
            background: #f9fafb;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #e5e7eb;
            transition: all 0.2s;
        }

        .dish-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border-color: #4f46e5;
        }

        .dish-card.voted {
            border: 2px solid #4f46e5;
            background: #eef2ff;
        }

        .dish-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .dish-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #1f2937;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.025em;
        }

        .badge.veg {
            background: #d1fae5;
            color: #065f46;
        }

        .badge.nonveg {
            background: #fee2e2;
            color: #991b1b;
        }

        .dish-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            background: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .action-btn.like-btn {
            color: #10b981;
        }

        .action-btn.like-btn.active-like {
            background: #d1fae5;
            border-color: #10b981;
            color: #065f46;
        }

        .action-btn.dislike-btn {
            color: #ef4444;
        }

        .action-btn.dislike-btn.active-dislike {
            background: #fee2e2;
            border-color: #ef4444;
            color: #991b1b;
        }

        .action-btn:hover {
            background: #f3f4f6;
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .delete-vote-btn {
            width: 100%;
            margin-top: 10px;
            padding: 8px;
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .delete-vote-btn:hover {
            background: #fecaca;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #9ca3af;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            color: #d1d5db;
        }

        .menu-info {
            background: #eef2ff;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #4f46e5;
        }

        .menu-info p {
            margin: 5px 0;
            color: #1f2937;
        }

        .menu-info .date {
            font-weight: 700;
            color: #4f46e5;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 12px;
            color: white;
            z-index: 9999;
            animation: slideIn 0.3s ease;
        }

        .notification.success {
            background: #10b981;
        }

        .notification.error {
            background: #ef4444;
        }

        .notification.info {
            background: #3b82f6;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .header-row {
                flex-direction: column;
                align-items: stretch;
            }

            .nav-links {
                flex-direction: column;
            }

            .dishes-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="menuContent">
            <div class="header-row">
                <div class="nav-links">
                    <a href="menu.html" class="nav-link active">📋 Menu</a>
                    <a href="feedback.html" class="nav-link">💬 Feedback</a>
                    <button class="logout-btn" onclick="logout()">🚪 Logout</button>
                </div>
                
                <div class="date-picker-form">
                    <label for="menuDate">Date:</label>
                    <input type="date" id="menuDate" onchange="changeDate()">
                </div>
            </div>

            <div id="menuInfo" class="menu-info" style="display: none;"></div>

            <div class="title-section">
                <h1>Daily Menu</h1>
                <p class="subtitle" id="currentDate"></p>
                <div class="pref-badge" id="prefBadge">
                    Welcome, <span id="studentNameSpan"></span><br>
                    Preference: <span id="prefSpan">Loading...</span>
                </div>
            </div>

            <div id="menuItems"></div>
        </div>
    </div>

    <script>
        let currentAccount = null;
        let currentStudent = null;
        let studentPreference = 'veg';
        let currentDate = new Date().toISOString().split('T')[0];
        const API_URL = 'api.php';

        window.addEventListener('load', function() {
            const params = new URLSearchParams(window.location.search);
            const account = params.get('account');
            const date = params.get('date');
            
            if (date) {
                document.getElementById('menuDate').value = date;
                currentDate = date;
            }
            
            const savedAccount = sessionStorage.getItem('studentAccount') || localStorage.getItem('studentAccount');
            currentAccount = account || savedAccount;
            
            if (currentAccount) {
                loadStudentData(currentAccount);
            } else {
                window.location.replace('login.html');
            }
        });

        async function loadStudentData(account) {
            try {
                const res = await fetch(`${API_URL}?action=search&account_number=${encodeURIComponent(account)}`);
                const data = await res.json();

                if (data.success) {
                    currentStudent = data.data.student;
                    studentPreference = currentStudent.food_preference || 'veg';
                    
                    document.getElementById('studentNameSpan').textContent = currentStudent.full_name || 'Student';
                    document.getElementById('prefSpan').textContent = 
                        studentPreference === 'veg' ? '🥬 Vegetarian' : '🍗 Non-Vegetarian';
                    document.getElementById('prefSpan').style.color = 
                        studentPreference === 'veg' ? '#10b981' : '#ef4444';
                    
                    document.getElementById('menuDate').value = currentDate;
                    loadMenu();
                } else {
                    showNotification('Error loading student data', 'error');
                }
            } catch (err) {
                console.error('Error loading student:', err);
                showNotification('Error connecting to server', 'error');
            }
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                sessionStorage.clear();
                localStorage.clear();
                window.location.replace('login.html');
            }
        }

        function loadMenu() {
            const date = document.getElementById('menuDate').value;
            currentDate = date;
            
            document.getElementById('currentDate').textContent = 
                new Date(date).toLocaleDateString('en-US', { 
                    weekday: 'long', 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric' 
                });

            const savedMenus = JSON.parse(localStorage.getItem('saved_menus')) || {};
            let menuItems = [];

            if (savedMenus[date] && savedMenus[date].items) {
                menuItems = savedMenus[date].items;
                
                document.getElementById('menuInfo').style.display = 'block';
                document.getElementById('menuInfo').innerHTML = `
                    <p>📋 Menu uploaded for <span class="date">${date}</span></p>
                `;
            } else {
                menuItems = getDefaultMenu();
                document.getElementById('menuInfo').style.display = 'none';
            }

            renderMenu(menuItems);
        }

        function getDefaultMenu() {
            return [
                { id: 1, text: '[Breakfast][VEG] Poha', meal: 'breakfast', type: 'veg' },
                { id: 2, text: '[Breakfast][VEG] Idli with Sambar', meal: 'breakfast', type: 'veg' },
                { id: 3, text: '[Breakfast][VEG] Vada', meal: 'breakfast', type: 'veg' },
                { id: 4, text: '[Breakfast][NONVEG] Egg Bhurji', meal: 'breakfast', type: 'nonveg' },
                { id: 5, text: '[Breakfast][NONVEG] Chicken Sausage', meal: 'breakfast', type: 'nonveg' },
                { id: 6, text: '[Lunch][VEG] Dal Makhani', meal: 'lunch', type: 'veg' },
                { id: 7, text: '[Lunch][VEG] Jeera Rice', meal: 'lunch', type: 'veg' },
                { id: 8, text: '[Lunch][VEG] Roti', meal: 'lunch', type: 'veg' },
                { id: 9, text: '[Lunch][NONVEG] Chicken Curry', meal: 'lunch', type: 'nonveg' },
                { id: 10, text: '[Lunch][NONVEG] Egg Curry', meal: 'lunch', type: 'nonveg' },
                { id: 11, text: '[Dinner][VEG] Palak Paneer', meal: 'dinner', type: 'veg' },
                { id: 12, text: '[Dinner][VEG] Pulao', meal: 'dinner', type: 'veg' },
                { id: 13, text: '[Dinner][VEG] Naan', meal: 'dinner', type: 'veg' },
                { id: 14, text: '[Dinner][NONVEG] Chicken Biryani', meal: 'dinner', type: 'nonveg' },
                { id: 15, text: '[Dinner][NONVEG] Tandoori Chicken', meal: 'dinner', type: 'nonveg' }
            ];
        }

        function renderMenu(menu) {
            const menuItems = document.getElementById('menuItems');
            const meals = ['breakfast', 'lunch', 'dinner'];
            let html = '';

            const votes = getVotesForDate(currentAccount, currentDate);

            meals.forEach(meal => {
                const mealItems = menu.filter(item => 
                    item.meal === meal && 
                    (studentPreference === 'veg' ? item.type === 'veg' : true)
                );

                if (mealItems.length === 0) return;

                html += `
                    <div class="meal-group">
                        <h2 class="meal-title">${meal.charAt(0).toUpperCase() + meal.slice(1)}</h2>
                        <div class="dishes-grid">
                `;

                mealItems.forEach(item => {
                    const dish = item.text.replace(/\[(Breakfast|Lunch|Dinner|VEG|NONVEG)\]/g, '').trim();
                    const isVoted = votes[meal] && votes[meal].item === dish;
                    
                    html += createDishCard(item, dish, isVoted, votes[meal]);
                });

                html += `
                        </div>
                    </div>
                `;
            });

            if (html === '') {
                html = `
                    <div class="empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                        <h3>No Menu Items</h3>
                        <p>No menu items found for your preference on this date.</p>
                    </div>
                `;
            }

            menuItems.innerHTML = html;
        }

        function createDishCard(item, dish, isVoted, voteData) {
            const isLiked = isVoted && voteData.vote === 'like';
            const isDisliked = isVoted && voteData.vote === 'dislike';
            
            return `
                <div class="dish-card ${isVoted ? 'voted' : ''}" data-item="${dish}" data-meal="${item.meal}" data-type="${item.type}">
                    <div class="dish-header">
                        <span class="dish-name">${dish}</span>
                        <span class="badge ${item.type}">${item.type === 'veg' ? 'VEG' : 'NON-VEG'}</span>
                    </div>
                    
                    <div class="dish-actions">
                        <button class="action-btn like-btn ${isLiked ? 'active-like' : ''}" 
                                onclick="vote('like', this)" 
                                ${isVoted ? 'disabled' : ''}>
                            👍 Like
                        </button>
                        <button class="action-btn dislike-btn ${isDisliked ? 'active-dislike' : ''}" 
                                onclick="vote('dislike', this)" 
                                ${isVoted ? 'disabled' : ''}>
                            👎 Dislike
                        </button>
                    </div>
                    ${isVoted ? `
                        <button class="delete-vote-btn" onclick="deleteVote('${item.meal}', '${dish}', this)">
                            🗑️ Delete Vote
                        </button>
                    ` : ''}
                </div>
            `;
        }

        function vote(type, btn) {
            const parent = btn.closest('.dish-card');
            const likeBtn = parent.querySelector('.like-btn');
            const dislikeBtn = parent.querySelector('.dislike-btn');
            const itemName = parent.dataset.item;
            const meal = parent.dataset.meal;
            const foodType = parent.dataset.type;

            const votes = getVotesForDate(currentAccount, currentDate);
            if (votes[meal]) {
                showNotification(`You have already voted for ${meal} today!`, 'error');
                return;
            }

            const voteData = {
                account: currentAccount,
                date: currentDate,
                meal: meal,
                item: itemName,
                foodType: foodType,
                vote: type,
                timestamp: new Date().toISOString()
            };

            saveVote(voteData);
            
            if (type === 'like') {
                likeBtn.classList.add('active-like');
                dislikeBtn.classList.remove('active-dislike');
            } else {
                dislikeBtn.classList.add('active-dislike');
                likeBtn.classList.remove('active-like');
            }
            
            likeBtn.disabled = true;
            dislikeBtn.disabled = true;
            parent.classList.add('voted');
            
            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-vote-btn';
            deleteBtn.innerHTML = '🗑️ Delete Vote';
            deleteBtn.onclick = function() { deleteVote(meal, itemName, this); };
            parent.appendChild(deleteBtn);
            
            showNotification(`You ${type === 'like' ? 'liked' : 'disliked'} ${itemName}`, 'success');
        }

        function deleteVote(meal, item, btn) {
            if (!currentAccount) return;
            
            if (confirm('Are you sure you want to delete your vote?')) {
                const parent = btn.closest('.dish-card');
                
                const storageKey = `menu_votes_${currentAccount}`;
                let votes = JSON.parse(localStorage.getItem(storageKey)) || {};
                
                if (votes[currentDate] && votes[currentDate][meal]) {
                    delete votes[currentDate][meal];
                    
                    if (Object.keys(votes[currentDate]).length === 0) {
                        delete votes[currentDate];
                    }
                    
                    localStorage.setItem(storageKey, JSON.stringify(votes));
                }
                
                const feedbackKey = 'all_menu_feedback';
                let allFeedback = JSON.parse(localStorage.getItem(feedbackKey)) || [];
                allFeedback = allFeedback.filter(f => 
                    !(f.account === currentAccount && f.date === currentDate && f.meal === meal)
                );
                localStorage.setItem(feedbackKey, JSON.stringify(allFeedback));
                
                const likeBtn = parent.querySelector('.like-btn');
                const dislikeBtn = parent.querySelector('.dislike-btn');
                likeBtn.classList.remove('active-like');
                dislikeBtn.classList.remove('active-dislike');
                likeBtn.disabled = false;
                dislikeBtn.disabled = false;
                parent.classList.remove('voted');
                btn.remove();
                
                showNotification('Vote deleted successfully', 'success');
            }
        }

        function saveVote(voteData) {
            const storageKey = `menu_votes_${voteData.account}`;
            let votes = JSON.parse(localStorage.getItem(storageKey)) || {};
            
            if (!votes[voteData.date]) {
                votes[voteData.date] = {};
            }
            
            votes[voteData.date][voteData.meal] = voteData;
            localStorage.setItem(storageKey, JSON.stringify(votes));
            
            const feedbackKey = 'all_menu_feedback';
            let allFeedback = JSON.parse(localStorage.getItem(feedbackKey)) || [];
            
            allFeedback.push({
                id: Date.now() + Math.random(),
                account: voteData.account,
                full_name: currentStudent ? currentStudent.full_name : 'Unknown',
                date: voteData.date,
                meal: voteData.meal,
                item: voteData.item,
                food_type: voteData.foodType,
                feedback: voteData.vote,
                created_at: voteData.timestamp
            });
            
            localStorage.setItem(feedbackKey, JSON.stringify(allFeedback));
        }

        function getVotesForDate(account, date) {
            const storageKey = `menu_votes_${account}`;
            const votes = JSON.parse(localStorage.getItem(storageKey)) || {};
            return votes[date] || {};
        }

        function changeDate() {
            const date = document.getElementById('menuDate').value;
            currentDate = date;
            loadMenu();
        }

        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }
    </script>
</body>
</html>
