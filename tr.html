<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meals Tracking Report - Hostel Mess</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f1f5f9;
            color: #1e293b;
            padding-top: 10px;
        }

        /* ===== HEADER ===== */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(12, 18, 28, 0.97);
            padding: 16px 40px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
            z-index: 1000;
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 24px;
            justify-content: space-between;
        }

        .header-logo {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .header-logo img {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
        }

        .header-text {
            flex: 1;
        }

        .header-title {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(90deg, #f43f5e, #fb7185, #fda4af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .navbar {
            margin-top: 6px;
            display: flex;
            gap: 22px;
            align-items: center;
        }

        .navbar a {
            position: relative;
            color: #d1d5db;
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 600;
            transition: color 0.25s;
        }

        .navbar a:hover {
            color: #f43f5e;
        }

        .navbar a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -6px;
            width: 0;
            height: 2px;
            background: #f43f5e;
            transition: width 0.25s;
        }

        .navbar a:hover::after {
            width: 100%;
        }

        /* ===== CONTAINER ===== */
        .container {
            max-width: 1200px;
            margin: 120px auto 40px;
            padding: 0 20px;
        }

        /* ===== CARD ===== */
        .card {
            background: #ffffff;
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #1e293b;
            font-size: 2rem;
        }

        /* ===== SEARCH SECTION ===== */
        .search-section {
            max-width: 600px;
            margin: 0 auto 30px;
        }

        .search-form {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .search-form input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }

        .search-form input:focus {
            border-color: #f43f5e;
        }

        .search-form button {
            padding: 12px 24px;
            background: #b3123c;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-form button:hover {
            background: #9f0f35;
        }

        .date-range {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .date-range input {
            flex: 1;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
        }

        .view-all {
            text-align: center;
        }

        .view-all a {
            color: #b3123c;
            text-decoration: none;
            font-weight: 600;
        }

        .view-all a:hover {
            text-decoration: underline;
        }

        /* ===== SUMMARY CARDS ===== */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .summary-card {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .summary-card .label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .summary-card .value {
            font-size: 2rem;
            font-weight: 700;
        }

        /* ===== CHART CONTAINER ===== */
        .chart-container {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            height: 400px;
        }

        /* ===== TABLE ===== */
        .table-container {
            overflow-x: auto;
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #0f172a;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        tr:hover td {
            background: #f8fafc;
        }

        .small-text {
            font-size: 0.8rem;
            color: #64748b;
        }

        .btn-delete {
            padding: 6px 12px;
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s;
        }

        .btn-delete:hover {
            background: #b91c1c;
        }

        .meal-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: capitalize;
        }

        .meal-badge.breakfast {
            background: #fef9c3;
            color: #713f12;
        }

        .meal-badge.lunch {
            background: #dbeafe;
            color: #1e3a8a;
        }

        .meal-badge.dinner {
            background: #ede9fe;
            color: #4c1d95;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #1e293b;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #0f172a;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .header {
                padding: 14px 16px;
            }

            .header-content {
                flex-wrap: wrap;
            }

            .container {
                margin-top: 160px;
            }

            .search-form {
                flex-direction: column;
            }

            .date-range {
                flex-direction: column;
            }

            .summary-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
  
    <!-- ===== MAIN CONTENT ===== -->
    <div class="container">
        <div class="card">
            <h2>📈 Meals Tracking Report</h2>

            <!-- Search Section -->
           
                <div class="view-all">
                    <a href="#" onclick="viewOverallSummary()">📊 View Overall Summary</a>
                </div>
            </div>

            <!-- Summary Cards -->
            <div class="summary-grid" id="summaryCards">
                <div class="summary-card">
                    <div class="label">🍳 Breakfast</div>
                    <div class="value">0</div>
                </div>
                <div class="summary-card">
                    <div class="label">🍛 Lunch</div>
                    <div class="value">0</div>
                </div>
                <div class="summary-card">
                    <div class="label">🍽️ Dinner</div>
                    <div class="value">0</div>
                </div>
                <div class="summary-card">
                    <div class="label">🥬 Veg</div>
                    <div class="value">0</div>
                </div>
                <div class="summary-card">
                    <div class="label">🍖 Non-Veg</div>
                    <div class="value">0</div>
                </div>
            </div>

            <!-- Chart -->
            <div class="chart-container">
                <canvas id="mealChart"></canvas>
            </div>

            <!-- Individual Meal Records Table -->
            <h3 style="margin-bottom: 15px;">Individual Meal Records</h3>
            <div class="table-container">
                <table id="mealTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Date</th>
                            <th>Meal Type</th>
                            <th>Food Type</th>
                            <th>Time</th>
                            <th>Student</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="mealTableBody"></tbody>
                </table>
            </div>

            <div style="text-align: center;">
                <a href="index.html" class="btn">← Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        let mealChart = null;

        async function searchStudent() {
            const account = document.getElementById('accountInput').value.trim();
            if (!account) {
                alert('Please enter an account number');
                return;
            }

            try {
                const response = await fetch(`api.php?action=search&account_number=${encodeURIComponent(account)}`);
                const result = await response.json();
                
                if (result.success) {
                    // Fetch meal records for this student
                    const mealResponse = await fetch(`api.php?action=get_meals&account_number=${encodeURIComponent(account)}`);
                    const mealResult = await mealResponse.json();
                    
                    if (mealResult.success) {
                        processMealData(mealResult.data);
                    } else {
                        alert('No meal records found for this account');
                    }
                } else {
                    alert('Student not found');
                }
            } catch (error) {
                console.error('Error fetching data:', error);
                alert('Error loading data. Please try again.');
            }
        }

        async function viewOverallSummary() {
            try {
                const response = await fetch('api.php?action=get_all_meals');
                const result = await response.json();
                
                if (result.success) {
                    processMealData(result.data);
                } else {
                    alert('No meal records found');
                }
            } catch (error) {
                console.error('Error fetching data:', error);
                alert('Error loading data. Please try again.');
            }
        }

        function processMealData(meals) {
            // Calculate totals
            let breakfast = 0, lunch = 0, dinner = 0, veg = 0, nonveg = 0;
            const dailyMap = {};

            meals.forEach(meal => {
                const date = meal.meal_time.split(' ')[0];
                const foodType = meal.food_type || 'veg';
                
                // Count by meal type
                if (meal.meal_type === 'breakfast') breakfast++;
                if (meal.meal_type === 'lunch') lunch++;
                if (meal.meal_type === 'dinner') dinner++;
                
                // Count by food preference
                if (foodType === 'veg') veg++;
                else nonveg++;

                // Group by date
                if (!dailyMap[date]) {
                    dailyMap[date] = { 
                        date: date, 
                        breakfast: 0, lunch: 0, dinner: 0, 
                        veg: 0, nonveg: 0,
                        breakfastTimes: [], lunchTimes: [], dinnerTimes: []
                    };
                }
                
                dailyMap[date][meal.meal_type]++;
                if (foodType === 'veg') dailyMap[date].veg++;
                else dailyMap[date].nonveg++;
                
                // Store meal time
                const time = meal.meal_time.split(' ')[1]?.substring(0, 5) || '';
                if (time) {
                    dailyMap[date][meal.meal_type + 'Times'].push(time);
                }
            });

            const summaryData = {
                breakfast,
                lunch,
                dinner,
                veg,
                nonveg,
                daily: Object.values(dailyMap).sort((a, b) => b.date.localeCompare(a.date))
            };

            updateSummary(summaryData);
            updateChart(summaryData.daily);
            updateTable(summaryData.daily);
        }

        function updateSummary(data) {
            document.querySelector('#summaryCards .summary-card:nth-child(1) .value').textContent = data.breakfast;
            document.querySelector('#summaryCards .summary-card:nth-child(2) .value').textContent = data.lunch;
            document.querySelector('#summaryCards .summary-card:nth-child(3) .value').textContent = data.dinner;
            document.querySelector('#summaryCards .summary-card:nth-child(4) .value').textContent = data.veg;
            document.querySelector('#summaryCards .summary-card:nth-child(5) .value').textContent = data.nonveg;
        }

        function updateChart(dailyData) {
            const ctx = document.getElementById('mealChart').getContext('2d');
            
            const labels = dailyData.map(d => d.date);
            const breakfastData = dailyData.map(d => d.breakfast);
            const lunchData = dailyData.map(d => d.lunch);
            const dinnerData = dailyData.map(d => d.dinner);
            const vegData = dailyData.map(d => d.veg);
            const nonvegData = dailyData.map(d => d.nonveg);

            if (mealChart) {
                mealChart.destroy();
            }

            mealChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Breakfast',
                            data: breakfastData,
                            backgroundColor: '#fbbf24'
                        },
                        {
                            label: 'Lunch',
                            data: lunchData,
                            backgroundColor: '#3b82f6'
                        },
                        {
                            label: 'Dinner',
                            data: dinnerData,
                            backgroundColor: '#a855f7'
                        },
                        {
                            label: 'Veg',
                            data: vegData,
                            backgroundColor: '#22c55e'
                        },
                        {
                            label: 'Non-Veg',
                            data: nonvegData,
                            backgroundColor: '#ef4444'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        let currentMeals = [];

        function updateTable(dailyData) {
            const tbody = document.getElementById('mealTableBody');
            
            // Store meals for delete functionality
            currentMeals = dailyData;
            
            if (dailyData.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 30px; color: #64748b;">
                            No meal records found
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = dailyData.map((meal, index) => {
                const mealDate = new Date(meal.meal_time);
                const dateStr = mealDate.toLocaleDateString('en-US');
                const timeStr = mealDate.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
                
                return `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${dateStr}</td>
                        <td><span class="meal-badge ${meal.meal_type}">${meal.meal_type}</span></td>
                        <td>${meal.food_type || 'N/A'}</td>
                        <td>${timeStr}</td>
                        <td>${meal.student_name || meal.account_number}</td>
                        <td>
                            <button class="btn-delete" onclick="deleteMeal(${meal.id})">Delete</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        async function deleteMeal(mealId) {
            if (!confirm('Are you sure you want to delete this meal record?')) {
                return;
            }
            
            try {
                const response = await fetch(`api.php?action=delete_meal&id=${mealId}`);
                const result = await response.json();
                
                if (result.success) {
                    alert('Meal record deleted successfully!');
                    // Refresh the data
                    viewOverallSummary();
                } else {
                    alert('Error deleting meal: ' + result.message);
                }
            } catch (error) {
                console.error('Error deleting meal:', error);
                alert('Error deleting meal. Please try again.');
            }
        }

        window.addEventListener('load', function() {
            viewOverallSummary();
        });
    </script>
</body>
</html>
