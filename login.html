<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - Hostel Mess</title>
    
    <!-- PREVENT BACK BUTTON AFTER LOGOUT -->
    <script>
        (function() {
            // Clear history on login page load
            history.pushState(null, null, location.href);
            
            window.onpopstate = function() {
                history.pushState(null, null, location.href);
            };
        })();
    </script>

    <!-- PREVENT PAGE CACHING -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="Cache-Control" content="no-store">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
        }

        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #f43f5e, #e11d48);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 40px;
            color: white;
            box-shadow: 0 10px 20px rgba(244, 63, 94, 0.3);
        }

        .login-header h2 {
            color: #1e293b;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .login-header p {
            color: #64748b;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #1e293b;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-group input:focus {
            border-color: #f43f5e;
            box-shadow: 0 0 0 4px rgba(244, 63, 94, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #f43f5e, #e11d48);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .login-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(244, 63, 94, 0.4);
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
            animation: slideIn 0.3s ease;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
            animation: shake 0.3s ease;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            75% {
                transform: translateX(5px);
            }
        }

        .sample-box {
            background: #f8fafc;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #e2e8f0;
            margin-top: 20px;
        }

        .sample-box h4 {
            color: #1e293b;
            margin-bottom: 15px;
            font-size: 14px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .account-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: white;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .account-item:hover {
            border-color: #f43f5e;
            transform: translateX(5px);
            background: #fff5f5;
        }

        .account-item:last-child {
            margin-bottom: 0;
        }

        .account-icon {
            width: 35px;
            height: 35px;
            background: #f1f5f9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #f43f5e;
        }

        .account-number {
            font-weight: 600;
            color: #1e293b;
            font-size: 16px;
        }

        .account-name {
            color: #64748b;
            font-size: 13px;
        }

        .staff-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #e2e8f0;
        }

        .staff-link a {
            color: #f43f5e;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .staff-link a:hover {
            text-decoration: underline;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">🎓</div>
                <h2>Student Login</h2>
                <p>Enter your account number to continue</p>
            </div>

            <div id="message" class="message"></div>

            <div class="input-group">
                <label for="accountNumber">Account Number</label>
                <input type="text" id="accountNumber" placeholder="Enter your account number (e.g., 541)">
            </div>

            <button class="login-btn" onclick="handleLogin()" id="loginBtn">
                <span class="spinner" id="spinner" style="display: none;"></span>
                <span id="loginBtnText">Login to Dashboard</span>
            </button>

            <div class="sample-box">
                <h4>📋 Sample Account Numbers</h4>

                <div class="account-item" onclick="fillAccount('541')">
                    <div class="account-icon">👤</div>
                    <div>
                        <div class="account-number">541</div>
                        <div class="account-name">John Doe</div>
                    </div>
                </div>

                <div class="account-item" onclick="fillAccount('542')">
                    <div class="account-icon">👩</div>
                    <div>
                        <div class="account-number">542</div>
                        <div class="account-name">Jane Smith</div>
                    </div>
                </div>

                <div class="account-item" onclick="fillAccount('543')">
                    <div class="account-icon">👨</div>
                    <div>
                        <div class="account-number">543</div>
                        <div class="account-name">Bob Wilson</div>
                    </div>
                </div>

                <div class="account-item" onclick="fillAccount('544')">
                    <div class="account-icon">👩</div>
                    <div>
                        <div class="account-number">544</div>
                        <div class="account-name">Alice Brown</div>
                    </div>
                </div>

                <div class="account-item" onclick="fillAccount('545')">
                    <div class="account-icon">👨</div>
                    <div>
                        <div class="account-number">545</div>
                        <div class="account-name">Charlie Lee</div>
                    </div>
                </div>
            </div>

            <div class="staff-link">
                <a href="staff_login.html">👨‍🍳 Staff Login →</a>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'api.php';

        function fillAccount(account) {
            document.getElementById('accountNumber').value = account;
            document.getElementById('message').className = 'message';
        }

        function handleLogin() {
            const accountNumber = document.getElementById('accountNumber').value.trim();
            const messageDiv = document.getElementById('message');
            const loginBtn = document.getElementById('loginBtn');
            const spinner = document.getElementById('spinner');
            const loginBtnText = document.getElementById('loginBtnText');

            messageDiv.className = 'message';
            messageDiv.innerHTML = '';

            if (!accountNumber) {
                messageDiv.className = 'message error';
                messageDiv.innerHTML = '❌ Please enter your account number';
                return;
            }

            loginBtn.disabled = true;
            spinner.style.display = 'inline-block';
            loginBtnText.textContent = 'Verifying...';

            fetch(`${API_URL}?action=search&account_number=${encodeURIComponent(accountNumber)}`)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        sessionStorage.setItem('studentLoggedIn', 'true');
                        sessionStorage.setItem('studentAccount', accountNumber);
                        localStorage.setItem('studentLoggedIn', 'true');
                        localStorage.setItem('studentAccount', accountNumber);
                        
                        sessionStorage.removeItem('staffLoggedIn');
                        localStorage.removeItem('staffLoggedIn');

                        messageDiv.className = 'message success';
                        messageDiv.innerHTML = '✅ Login successful! Redirecting to menu...';

                        spinner.style.display = 'none';
                        loginBtnText.textContent = 'Redirecting...';

                        setTimeout(() => {
                            window.location.replace('menu.html?account=' + encodeURIComponent(accountNumber));
                        }, 1500);
                    } else {
                        messageDiv.className = 'message error';
                        messageDiv.innerHTML = '❌ Account not found. Please register first.';
                        
                        const registerLink = document.createElement('div');
                        registerLink.style.marginTop = '10px';
                        registerLink.innerHTML = '<a href="register.html" style="color: #f43f5e; font-weight: 600;">📝 Register New Account</a>';
                        messageDiv.appendChild(registerLink);

                        loginBtn.disabled = false;
                        spinner.style.display = 'none';
                        loginBtnText.textContent = 'Login to Dashboard';
                    }
                })
                .catch(err => {
                    console.error('Login error:', err);
                    messageDiv.className = 'message error';
                    messageDiv.innerHTML = '❌ Error connecting to server. Please try again.';
                    
                    loginBtn.disabled = false;
                    spinner.style.display = 'none';
                    loginBtnText.textContent = 'Login to Dashboard';
                });
        }

        document.getElementById('accountNumber').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });

        document.getElementById('accountNumber').addEventListener('input', function () {
            document.getElementById('message').className = 'message';
        });

        window.addEventListener('load', function() {
            const studentLoggedIn = sessionStorage.getItem('studentLoggedIn') === 'true' || localStorage.getItem('studentLoggedIn') === 'true';
            const staffLoggedIn = sessionStorage.getItem('staffLoggedIn') === 'true' || localStorage.getItem('staffLoggedIn') === 'true';
            const account = sessionStorage.getItem('studentAccount') || localStorage.getItem('studentAccount');
            
            if (studentLoggedIn && account) {
                window.location.replace('menu.html?account=' + encodeURIComponent(account));
            } else if (staffLoggedIn) {
                window.location.replace('staff.html');
            }
        });
    </script>
</body>

</html>
